<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo-icon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Harshad Hindlekar portfolio: software engineering, frontend, full stack, dashboards, and immersive web experiences."
    /> 
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-icon.jpg" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>HARSHAD</title>
    <style>
      :root {
        --boot-bg: #02070d;
        --boot-surface: rgba(5, 18, 28, 0.78);
        --boot-accent: #63f5e5;
        --boot-blue: #3587ff;
        --boot-text: #f7fbff;
        --boot-muted: #a9bac7;
      }

      html,
      body {
        min-height: 100%;
        background: var(--boot-bg);
      }

      #app-root-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--boot-text);
        background:
          radial-gradient(circle at 72% 22%, rgba(53, 135, 255, 0.18), transparent 32%),
          radial-gradient(circle at 22% 64%, rgba(99, 245, 229, 0.12), transparent 35%),
          linear-gradient(180deg, rgba(2, 7, 13, 0.58), var(--boot-bg));
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      body.react-ready #app-root-loader {
        opacity: 0;
        visibility: hidden;
      }

      .boot-loader {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(460px, 100%);
        padding: 34px 28px;
        border: 1px solid rgba(99, 245, 229, 0.28);
        border-radius: 8px;
        background: var(--boot-surface);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36), inset 0 0 38px rgba(99, 245, 229, 0.05);
        overflow: hidden;
      }

      .boot-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(99, 245, 229, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 245, 229, 0.06) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: linear-gradient(180deg, #000, transparent 78%);
      }

      .boot-loader__orbit {
        position: relative;
        width: 118px;
        aspect-ratio: 1;
        border: 1px solid rgba(99, 245, 229, 0.46);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 50%, rgba(99, 245, 229, 0.28) 0 7px, transparent 8px),
          radial-gradient(circle, rgba(99, 245, 229, 0.11), transparent 62%);
        box-shadow: 0 0 42px rgba(99, 245, 229, 0.2);
      }

      .boot-loader__orbit::before,
      .boot-loader__orbit::after {
        content: '';
        position: absolute;
        inset: 14px;
        border: 1px solid rgba(99, 245, 229, 0.3);
        border-radius: 50%;
        transform: rotateX(68deg) rotateZ(24deg);
      }

      .boot-loader__orbit::after {
        inset: 28px;
        border-color: rgba(53, 135, 255, 0.42);
        animation: boot-spin 1.8s linear infinite;
      }

      .boot-loader__dot {
        position: absolute;
        top: 22px;
        right: 18px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--boot-accent);
        box-shadow: 0 0 18px var(--boot-accent);
        animation: boot-pulse 1.35s ease-in-out infinite;
      }

      .boot-loader__copy {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 8px;
        text-align: center;
      }

      .boot-loader__copy strong {
        font: 700 clamp(24px, 7vw, 38px) Arial, sans-serif;
        letter-spacing: 0;
      }

      .boot-loader__copy span {
        color: var(--boot-muted);
        font: 500 12px/1.5 Arial, sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .boot-loader__bar {
        position: relative;
        z-index: 1;
        width: min(280px, 100%);
        height: 5px;
        border-radius: 999px;
        background: rgba(99, 245, 229, 0.14);
        overflow: hidden;
      }

      .boot-loader__bar span {
        display: block;
        width: 46%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, var(--boot-accent), var(--boot-blue));
        animation: boot-load 1.25s ease-in-out infinite;
      }

      @keyframes boot-spin {
        to {
          rotate: 360deg;
        }
      }

      @keyframes boot-pulse {
        0%, 100% {
          opacity: 0.55;
          transform: scale(1);
        }

        50% {
          opacity: 1;
          transform: scale(1.6);
        }
      }

      @keyframes boot-load {
        0% {
          transform: translateX(-105%);
        }

        100% {
          transform: translateX(230%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loader__orbit::after,
        .boot-loader__dot,
        .boot-loader__bar span {
          animation: none;
        }
      }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app-root-loader" role="status" aria-live="polite">
      <div class="boot-loader">
        <div class="boot-loader__orbit" aria-hidden="true">
          <span class="boot-loader__dot"></span>
        </div>
        <div class="boot-loader__copy">
          <strong>Tighten Your Seatbelt</strong>
          <span>Preparing mission control</span>
        </div>
        <div class="boot-loader__bar" aria-hidden="true"><span></span></div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
