    <circle cx="680" cy="304" r="8" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
    <circle cx="632" cy="394" r="8" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
    <circle cx="484" cy="422" r="8" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
