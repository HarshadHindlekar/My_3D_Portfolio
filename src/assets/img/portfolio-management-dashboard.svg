    <path d="M292 490 C316 479 342 476 366 464 C386 454 406 468 424 446 C449 416 472 418 494 408 C514 399 532 428 552 410 C574 390 600 397 620 408 C644 421 662 434 684 416 C711 394 742 414 762 399 C780 386 787 389 794 381" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

