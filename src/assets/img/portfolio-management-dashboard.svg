    <rect x="550" y="126" width="90" height="22" rx="11" fill="#ecfdf5"/>
    <text x="568" y="142" fill="#15803d" font-size="12" font-weight="900">+14.4% YTD</text>
    <rect x="650" y="126" width="94" height="22" rx="11" fill="#eff6ff"/>
    <text x="668" y="142" fill="#1d4ed8" font-size="12" font-weight="900">17.4% SI</text>
