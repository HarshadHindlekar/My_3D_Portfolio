<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Nike clone Vue thumbnail</title>
  <desc id="desc">Nike store hero page with red branding, large new arrival headline, yellow shoe product art, and product carousel cards.</desc>
  <defs>
    <linearGradient id="shoeGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe23b"/>
      <stop offset="55%" stop-color="#f7c400"/>
      <stop offset="100%" stop-color="#d99600"/>
    </linearGradient>
    <linearGradient id="shoeShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity=".48"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef0ff"/>
      <stop offset="100%" stop-color="#dde2fb"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity=".22"/>
    </filter>
    <filter id="shoeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#d97706" flood-opacity=".32"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>
  <rect x="430" y="0" width="470" height="560" fill="url(#panel)"/>

