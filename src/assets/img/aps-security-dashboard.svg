<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">APS Security dashboard thumbnail</title>
  <desc id="desc">Dark cybersecurity scanning dashboard with live console, finding log, and teal status indicators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#050707"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#00a889"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>
  <rect x="0" y="0" width="150" height="560" fill="#121416"/>
  <rect x="150" y="0" width="750" height="560" fill="#171717" opacity=".75"/>
  <line x1="150" y1="0" x2="150" y2="560" stroke="#2a2f34"/>
  <line x1="150" y1="78" x2="900" y2="78" stroke="#2a2f34"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <circle cx="38" cy="40" r="19" fill="url(#teal)" filter="url(#glow)"/>
    <path d="M38 28l9 4v8c0 8-5 12-9 14-4-2-9-6-9-14v-8z" fill="#eafffb"/>
    <text x="70" y="39" fill="#ffffff" font-size="18" font-weight="800">APS Security</text>
    <text x="70" y="58" fill="#7d8790" font-size="12">Pentest Platform</text>

    <text x="28" y="130" fill="#727b84" font-size="12" font-weight="700" letter-spacing="3">MAIN</text>
    <rect x="16" y="186" width="118" height="40" rx="6" fill="#123d35"/>
    <rect x="16" y="186" width="4" height="40" rx="2" fill="#17d7be"/>
    <text x="52" y="211" fill="#18dcc2" font-size="16" font-weight="800">Scans</text>
    <text x="52" y="162" fill="#aeb6bd" font-size="15">Dashboard</text>
    <text x="52" y="255" fill="#aeb6bd" font-size="15">Schedule</text>
    <text x="28" y="320" fill="#727b84" font-size="12" font-weight="700" letter-spacing="3">SYSTEM</text>
    <text x="52" y="360" fill="#aeb6bd" font-size="15">Notifications</text>
    <text x="52" y="400" fill="#aeb6bd" font-size="15">Settings</text>

    <text x="178" y="43" fill="#d5dce2" font-size="18">Scan / Private Assets /</text>
    <text x="375" y="43" fill="#ffffff" font-size="18" font-weight="800">New Scan</text>
    <rect x="770" y="22" width="98" height="34" rx="6" fill="#101010" stroke="#30363d"/>
    <text x="786" y="44" fill="#ffffff" font-size="13" font-weight="800">Export Report</text>

    <circle cx="205" cy="142" r="39" fill="none" stroke="#22d3bb" stroke-width="8" filter="url(#glow)"/>
    <text x="205" y="145" fill="#ffffff" font-size="19" font-weight="900" text-anchor="middle">100%</text>
    <text x="205" y="162" fill="#808993" font-size="10" text-anchor="middle">In Progress</text>

    <circle cx="286" cy="134" r="25" fill="url(#teal)" filter="url(#glow)"/>
    <text x="286" y="140" fill="#ffffff" font-size="21" text-anchor="middle">☼</text>
    <text x="286" y="184" fill="#15d9c0" font-size="14" font-weight="800" text-anchor="middle">Spidering</text>

    <g stroke="#33373a" stroke-width="2">
      <line x1="332" y1="134" x2="466" y2="134"/>
      <line x1="520" y1="134" x2="656" y2="134"/>
      <line x1="710" y1="134" x2="844" y2="134"/>
    </g>
    <g fill="#292b2d">
      <circle cx="493" cy="134" r="25"/>
      <circle cx="683" cy="134" r="25"/>
      <circle cx="871" cy="134" r="25"/>
    </g>
    <g fill="#727b84" font-size="14" text-anchor="middle">
      <text x="493" y="184">Testing</text>
      <text x="683" y="184">Validating</text>
      <text x="871" y="184">Reporting</text>
    </g>

    <rect x="178" y="235" width="520" height="220" rx="9" fill="#0d0e0f" stroke="#30363d"/>
    <rect x="178" y="235" width="520" height="54" rx="9" fill="#1d1d1d"/>
    <circle cx="196" cy="263" r="5" fill="#17d7be"/>
    <text x="211" y="270" fill="#ffffff" font-size="18" font-weight="900">Live Scan Console</text>
    <rect x="320" y="251" width="85" height="25" rx="12" fill="#0b4a42"/>
    <text x="337" y="268" fill="#16f0cf" font-size="13" font-weight="800">Running...</text>

    <text x="198" y="322" fill="#828b94" font-size="13">[09:04:00]</text>
    <text x="304" y="322" fill="#cfd3d8" font-size="14" font-weight="700">POST blocked on</text>
    <rect x="420" y="306" width="104" height="22" rx="4" fill="#073d38"/>
    <text x="430" y="322" fill="#1ee8ca" font-size="14" font-weight="900">/password/test</text>
    <text x="198" y="362" fill="#828b94" font-size="13">[09:06:00]</text>
    <text x="304" y="362" fill="#ffd200" font-size="14" font-weight="900">Accessed dashboard with X-UserId header.</text>
    <text x="198" y="402" fill="#828b94" font-size="13">[09:08:00]</text>
    <text x="304" y="402" fill="#ff6262" font-size="14" font-weight="900">SQL injection confirmed in authentication endpoint.</text>

    <rect x="716" y="235" width="164" height="220" rx="9" fill="#1d1d1d" stroke="#30363d"/>
    <text x="734" y="270" fill="#ffffff" font-size="18" font-weight="900">Finding Log</text>
    <rect x="734" y="302" width="128" height="62" rx="8" fill="#171717" stroke="#30363d"/>
    <rect x="746" y="316" width="27" height="27" rx="5" fill="#481e1e"/>
    <text x="756" y="335" fill="#ff5252" font-size="15" font-weight="900">0</text>
    <text x="746" y="387" fill="#ffffff" font-size="13" font-weight="900">SQL Injection</text>
    <text x="746" y="410" fill="#18dcc2" font-size="12" font-weight="900">/api/users/profile</text>

    <rect x="178" y="475" width="702" height="44" fill="#1d1d1d"/>
    <text x="195" y="503" fill="#16d7c0" font-size="13">Sub-Agents:</text>
    <text x="280" y="503" fill="#ffffff" font-size="13" font-weight="900">0</text>
    <text x="358" y="503" fill="#16d7c0" font-size="13">Parallel Executions:</text>
    <text x="496" y="503" fill="#ffffff" font-size="13" font-weight="900">2</text>
    <rect x="704" y="489" width="25" height="22" rx="5" fill="#481e1e"/>
    <text x="713" y="505" fill="#ff5252" font-size="12" font-weight="900">5</text>
    <text x="736" y="504" fill="#cfd3d8" font-size="13">Critical</text>
  </g>
</svg>
